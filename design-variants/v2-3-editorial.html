<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оценка Проекта — Калькулятор</title>

  <!-- Fontshare: Clash Display + Satoshi -->
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <!-- Google Fonts: Bricolage Grotesque + Outfit (fallbacks) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ========== RESET & BASE ========== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --lime: #c8ff00;
      --font-display: 'Clash Display', 'Bricolage Grotesque', sans-serif;
      --font-body: 'Satoshi', 'Outfit', sans-serif;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      font-weight: 400;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* ========== GRAIN / NOISE OVERLAY ========== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
    }

    /* Subtle animated grain shift */
    body::after {
      content: '';
      position: fixed;
      inset: -50%;
      z-index: 9998;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)'/%3E%3C/svg%3E");
      background-size: 300px 300px;
      animation: grainShift 0.5s steps(3) infinite;
    }

    @keyframes grainShift {
      0% { transform: translate(0, 0); }
      33% { transform: translate(-5px, 3px); }
      66% { transform: translate(3px, -5px); }
      100% { transform: translate(0, 0); }
    }

    /* ========== VIEWPORT CONTAINER ========== */
    .viewport {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* ========== TOP BAR ========== */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem;
    }

    .wordmark {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      color: var(--white);
      opacity: 0.6;
      transition: opacity 0.6s var(--ease-out-expo);
    }

    .wordmark:hover {
      opacity: 1;
    }

    .nav-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--white);
      opacity: 0.3;
      transition: all 0.5s var(--ease-out-expo);
      cursor: pointer;
    }

    .nav-dot:nth-child(1) {
      opacity: 0.8;
      background: var(--lime);
    }

    .nav-dot:hover {
      opacity: 1;
      transform: scale(1.6);
    }

    /* ========== HERO TYPOGRAPHY ========== */
    .hero-text {
      position: absolute;
      left: 2.5vw;
      top: 50%;
      transform: translateY(-58%);
      z-index: 10;
      mix-blend-mode: normal;
    }

    .hero-line {
      display: block;
      overflow: hidden;
    }

    .hero-line-1 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(6rem, 14vw, 15rem);
      line-height: 0.88;
      letter-spacing: -0.04em;
      color: var(--white);
      position: relative;
    }

    .hero-line-2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(5rem, 12vw, 13rem);
      line-height: 0.9;
      letter-spacing: -0.03em;
      color: var(--white);
      opacity: 0.35;
      margin-top: 0.05em;
      margin-left: 0.08em;
      mix-blend-mode: difference;
    }

    /* Reveal animation for hero text */
    .hero-line span {
      display: inline-block;
      transform: translateY(110%);
      animation: revealUp 1.2s var(--ease-out-expo) forwards;
    }

    .hero-line-2 span {
      animation-delay: 0.15s;
    }

    @keyframes revealUp {
      to { transform: translateY(0); }
    }

    /* ========== LIME ACCENT LINE ========== */
    .accent-line {
      position: absolute;
      left: 3vw;
      top: calc(50% + 8vw);
      width: 0;
      height: 2px;
      background: var(--lime);
      z-index: 20;
      animation: lineGrow 1s var(--ease-out-expo) 0.6s forwards;
    }

    @keyframes lineGrow {
      to { width: clamp(6rem, 18vw, 20rem); }
    }

    /* ========== SUBTITLE ========== */
    .subtitle {
      position: absolute;
      left: 3vw;
      top: calc(50% + 8vw + 1.5rem);
      z-index: 20;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeSlideUp 0.8s var(--ease-out-quart) 1s forwards;
    }

    .subtitle p {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: clamp(0.85rem, 1.1vw, 1.05rem);
      color: var(--white);
      opacity: 0.45;
      letter-spacing: 0.02em;
      line-height: 1.6;
      max-width: 28ch;
    }

    @keyframes fadeSlideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========== CALCULATOR PANEL (frosted glass, offset right) ========== */
    .calc-panel {
      position: absolute;
      right: 4vw;
      top: 50%;
      transform: translateY(-50%) translateX(30px);
      z-index: 30;
      width: clamp(320px, 32vw, 480px);
      opacity: 0;
      animation: panelIn 1s var(--ease-out-expo) 0.5s forwards;
    }

    @keyframes panelIn {
      to {
        opacity: 1;
        transform: translateY(-50%) translateX(0);
      }
    }

    .calc-glass {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(40px) saturate(1.2);
      -webkit-backdrop-filter: blur(40px) saturate(1.2);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      padding: 2.5rem 2rem;
      position: relative;
    }

    /* Thin lime top-edge accent on the card */
    .calc-glass::before {
      content: '';
      position: absolute;
      top: 0;
      left: 2rem;
      right: 60%;
      height: 1px;
      background: var(--lime);
      opacity: 0.6;
    }

    .calc-header {
      margin-bottom: 2rem;
    }

    .calc-step-label {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--lime);
      opacity: 0.7;
      margin-bottom: 0.6rem;
    }

    .calc-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--white);
    }

    /* ========== PROJECT TYPE LIST (vertical, elegant) ========== */
    .project-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .project-item {
      position: relative;
      display: flex;
      align-items: center;
      padding: 1rem 0.5rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.5s var(--ease-out-expo);
      overflow: hidden;
    }

    .project-item:last-child {
      border-bottom: none;
    }

    /* Lime underline sweep on hover */
    .project-item::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--lime);
      transition: width 0.6s var(--ease-out-expo);
    }

    .project-item:hover::after {
      width: 100%;
    }

    .project-item:hover {
      padding-left: 1rem;
    }

    .project-item:hover .item-emoji {
      transform: scale(1.1);
    }

    .project-item:hover .item-arrow {
      opacity: 1;
      transform: translateX(0);
      color: var(--lime);
    }

    .project-item:hover .item-name {
      color: var(--white);
    }

    .item-emoji {
      font-size: 1.3rem;
      width: 2.5rem;
      flex-shrink: 0;
      transition: transform 0.5s var(--ease-out-expo);
      line-height: 1;
    }

    .item-name {
      flex: 1;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.55);
      transition: color 0.5s var(--ease-out-expo);
    }

    .item-arrow {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 1.1rem;
      color: var(--white);
      opacity: 0;
      transform: translateX(-8px);
      transition: all 0.5s var(--ease-out-expo);
      flex-shrink: 0;
      margin-left: 1rem;
    }

    /* ========== BOTTOM LEFT META ========== */
    .meta-bottom-left {
      position: absolute;
      bottom: 2rem;
      left: 3rem;
      z-index: 100;
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.25;
    }

    /* ========== BOTTOM RIGHT PULSING LIME CIRCLE ========== */
    .pulse-dot {
      position: absolute;
      bottom: 2.2rem;
      right: 3rem;
      z-index: 100;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--lime);
    }

    .pulse-dot::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid var(--lime);
      opacity: 0;
      animation: pulse 2.8s ease-out infinite;
    }

    .pulse-dot::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid var(--lime);
      opacity: 0;
      animation: pulse 2.8s ease-out 0.6s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }

    /* ========== DECORATIVE OVERLAPPING NUMBER ========== */
    .deco-number {
      position: absolute;
      right: 2vw;
      bottom: 6vh;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(10rem, 22vw, 24rem);
      line-height: 1;
      color: var(--white);
      opacity: 0.018;
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: overlay;
      user-select: none;
    }

    /* ========== VERTICAL SIDE TEXT ========== */
    .side-text {
      position: absolute;
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      transform-origin: center center;
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.12;
      white-space: nowrap;
      z-index: 5;
      pointer-events: none;
    }

    /* ========== SUBTLE GRID LINES ========== */
    .grid-line-v {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255, 255, 255, 0.025);
      z-index: 2;
      pointer-events: none;
    }

    .grid-line-v:nth-child(1) { left: 33.333%; }
    .grid-line-v:nth-child(2) { left: 66.666%; }

    /* ========== SCROLL INDICATOR ========== */
    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeSlideUp 0.8s var(--ease-out-quart) 1.6s forwards;
    }

    .scroll-hint span {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.3;
    }

    .scroll-line {
      width: 1px;
      height: 28px;
      position: relative;
      overflow: hidden;
    }

    .scroll-line::after {
      content: '';
      position: absolute;
      top: -100%;
      left: 0;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, var(--white));
      animation: scrollDrop 1.8s ease-in-out infinite;
    }

    @keyframes scrollDrop {
      0% { top: -100%; opacity: 0; }
      40% { opacity: 0.4; }
      100% { top: 100%; opacity: 0; }
    }

    /* ========== INTERSECTION OBSERVER REVEAL CLASSES ========== */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.9s var(--ease-out-expo), transform 0.9s var(--ease-out-expo);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }
    .reveal-delay-5 { transition-delay: 0.5s; }

    /* ========== HOVER SELECTED STATE ON LIST ========== */
    .project-item.selected {
      padding-left: 1rem;
    }

    .project-item.selected .item-name {
      color: var(--white);
    }

    .project-item.selected .item-arrow {
      opacity: 1;
      transform: translateX(0);
      color: var(--lime);
    }

    .project-item.selected::after {
      width: 100%;
    }

    .project-item.selected .item-emoji {
      transform: scale(1.1);
    }

    /* ========== RESPONSIVE REFINEMENTS ========== */
    @media (max-width: 1024px) {
      .calc-panel {
        right: 2vw;
        width: clamp(280px, 45vw, 400px);
      }
      .hero-text {
        left: 4vw;
      }
      .top-bar {
        padding: 1.5rem 2rem;
      }
    }

    @media (max-width: 768px) {
      .hero-text {
        top: 22%;
        transform: none;
        left: 5vw;
      }
      .calc-panel {
        position: absolute;
        right: 5vw;
        left: 5vw;
        top: auto;
        bottom: 8vh;
        transform: none;
        width: auto;
        animation-name: panelInMobile;
      }
      .deco-number {
        display: none;
      }
      .side-text {
        display: none;
      }
      .accent-line {
        top: calc(22% + 18vw);
        left: 5vw;
      }
      .subtitle {
        top: calc(22% + 18vw + 1.5rem);
        left: 5vw;
      }
    }

    @keyframes panelInMobile {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="viewport">

    <!-- Subtle grid lines -->
    <div class="grid-line-v"></div>
    <div class="grid-line-v"></div>

    <!-- Top Bar -->
    <header class="top-bar">
      <div class="wordmark">calc.</div>
      <nav class="nav-dots">
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
      </nav>
    </header>

    <!-- Hero Typography -->
    <div class="hero-text">
      <div class="hero-line hero-line-1"><span>ОЦЕНКА</span></div>
      <div class="hero-line hero-line-2"><span>ПРОЕКТА</span></div>
    </div>

    <!-- Lime Accent Line -->
    <div class="accent-line"></div>

    <!-- Subtitle -->
    <div class="subtitle">
      <p>Точный расчёт стоимости<br>за три простых шага</p>
    </div>

    <!-- Calculator Panel -->
    <div class="calc-panel">
      <div class="calc-glass">
        <div class="calc-header">
          <div class="calc-step-label">Шаг 01</div>
          <div class="calc-title">Тип проекта</div>
        </div>
        <ul class="project-list">
          <li class="project-item reveal reveal-delay-1">
            <span class="item-emoji">🌐</span>
            <span class="item-name">Веб-сайт</span>
            <span class="item-arrow">&rarr;</span>
          </li>
          <li class="project-item reveal reveal-delay-2">
            <span class="item-emoji">📱</span>
            <span class="item-name">Мобильное приложение</span>
            <span class="item-arrow">&rarr;</span>
          </li>
          <li class="project-item reveal reveal-delay-3">
            <span class="item-emoji">🛒</span>
            <span class="item-name">Интернет-магазин</span>
            <span class="item-arrow">&rarr;</span>
          </li>
          <li class="project-item reveal reveal-delay-4">
            <span class="item-emoji">🤖</span>
            <span class="item-name">AI / ML решение</span>
            <span class="item-arrow">&rarr;</span>
          </li>
          <li class="project-item reveal reveal-delay-5">
            <span class="item-emoji">⚙️</span>
            <span class="item-name">Корпоративная система</span>
            <span class="item-arrow">&rarr;</span>
          </li>
        </ul>
      </div>
    </div>

    <!-- Decorative background number -->
    <div class="deco-number">01</div>

    <!-- Vertical side text -->
    <div class="side-text">Калькулятор стоимости</div>

    <!-- Bottom Left Meta -->
    <div class="meta-bottom-left">2026 / Онлайн</div>

    <!-- Bottom Right Pulsing Dot -->
    <div class="pulse-dot"></div>

    <!-- Scroll Indicator -->
    <div class="scroll-hint">
      <span>Далее</span>
      <div class="scroll-line"></div>
    </div>

  </div>

  <script>
    // Intersection Observer for reveal animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.1,
      rootMargin: '0px 0px -40px 0px'
    });

    document.querySelectorAll('.reveal').forEach(el => {
      observer.observe(el);
    });

    // Click interaction on project items
    document.querySelectorAll('.project-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.project-item').forEach(i => i.classList.remove('selected'));
        item.classList.add('selected');
      });
    });

    // Subtle parallax on mouse move (hero text)
    const heroText = document.querySelector('.hero-text');
    const calcPanel = document.querySelector('.calc-panel');

    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 2;
      const y = (e.clientY / window.innerHeight - 0.5) * 2;

      if (heroText) {
        heroText.style.transform = `translateY(-58%) translate(${x * -4}px, ${y * -3}px)`;
      }
      if (calcPanel) {
        calcPanel.style.transform = `translateY(-50%) translate(${x * 6}px, ${y * 4}px)`;
      }
    });
  </script>
</body>
</html>
