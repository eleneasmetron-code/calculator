<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вариант 5: Synthwave Retro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #0a0020;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Synthwave sunset */
.sunset {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60vh;
  background: linear-gradient(
    180deg,
    transparent 0%,
    rgba(255, 0, 128, 0.1) 30%,
    rgba(255, 0, 128, 0.2) 50%,
    rgba(255, 100, 0, 0.3) 70%,
    rgba(255, 200, 0, 0.2) 100%
  );
  pointer-events: none;
}

/* Sun */
.sun {
  position: fixed;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: linear-gradient(180deg, #ff0080 0%, #ff8c00 50%, #ffd700 100%);
  box-shadow: 0 0 100px rgba(255, 0, 128, 0.5), 0 0 200px rgba(255, 140, 0, 0.3);
  animation: sunPulse 4s ease-in-out infinite;
}

.sun::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 8px,
    rgba(10, 0, 32, 0.8) 8px,
    rgba(10, 0, 32, 0.8) 12px
  );
}

@keyframes sunPulse {
  0%, 100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.02); }
}

/* Grid floor */
.floor {
  position: fixed;
  bottom: 0;
  left: -50%;
  width: 200%;
  height: 40vh;
  background: 
    linear-gradient(90deg, rgba(255, 0, 128, 0.3) 1px, transparent 1px),
    linear-gradient(rgba(255, 0, 128, 0.3) 1px, transparent 1px);
  background-size: 80px 40px;
  transform: perspective(500px) rotateX(60deg);
  transform-origin: bottom;
  animation: floorScroll 4s linear infinite;
}

@keyframes floorScroll {
  0% { background-position: 0 0; }
  100% { background-position: 0 40px; }
}

/* Stars */
.stars {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 60vh;
  background-image: 
    radial-gradient(2px 2px at 20% 30%, #fff, transparent),
    radial-gradient(2px 2px at 40% 20%, #fff, transparent),
    radial-gradient(1px 1px at 60% 40%, #fff, transparent),
    radial-gradient(2px 2px at 80% 10%, #fff, transparent),
    radial-gradient(1px 1px at 10% 60%, #fff, transparent),
    radial-gradient(2px 2px at 70% 50%, #fff, transparent),
    radial-gradient(1px 1px at 30% 70%, #fff, transparent),
    radial-gradient(2px 2px at 90% 30%, #fff, transparent);
  animation: twinkle 3s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.container {
  position: relative;
  z-index: 10;
  max-width: 900px;
  margin: 0 auto;
  padding: 60px 24px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 60px;
}

.retro-badge {
  display: inline-block;
  padding: 8px 24px;
  background: linear-gradient(90deg, rgba(255,0,128,0.2), rgba(0,255,255,0.2));
  border: 1px solid rgba(255,0,128,0.5);
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #ff0080;
  margin-bottom: 32px;
}

h1 {
  font-size: 80px;
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: -4px;
  margin-bottom: 24px;
  text-shadow: 
    0 0 20px rgba(255,0,128,0.5),
    0 0 40px rgba(255,0,128,0.3),
    4px 4px 0 #ff0080,
    -2px -2px 0 #00ffff;
}

h1 .outline {
  -webkit-text-stroke: 2px #00ffff;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
}

.subtitle {
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  text-shadow: 0 0 20px rgba(0,255,255,0.3);
}

/* Progress */
.neon-progress {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 48px;
}

.neon-bar {
  width: 60px;
  height: 4px;
  background: rgba(255,255,255,0.1);
  position: relative;
}

.neon-bar.active {
  background: #ff0080;
  box-shadow: 0 0 10px #ff0080, 0 0 20px #ff0080;
}

/* Card */
.retro-card {
  background: linear-gradient(180deg, rgba(10, 0, 32, 0.95), rgba(20, 0, 50, 0.9));
  border: 2px solid;
  border-image: linear-gradient(90deg, #ff0080, #00ffff) 1;
  padding: 48px;
  position: relative;
}

.retro-card::before,
.retro-card::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border: 2px solid #ff0080;
}

.retro-card::before {
  top: 8px;
  left: 8px;
  border-right: none;
  border-bottom: none;
}

.retro-card::after {
  bottom: 8px;
  right: 8px;
  border-left: none;
  border-top: none;
}

.card-title {
  font-size: 32px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  color: #00ffff;
  text-shadow: 0 0 20px rgba(0,255,255,0.5);
}

.card-desc {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 36px;
}

/* Type grid */
.retro-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.retro-item {
  padding: 24px 16px;
  background: rgba(255,0,128,0.05);
  border: 1px solid rgba(255,0,128,0.3);
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: center;
  position: relative;
}

.retro-item:hover {
  background: rgba(255,0,128,0.15);
  border-color: #ff0080;
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(255,0,128,0.3);
}

.retro-item.selected {
  background: rgba(255,0,128,0.2);
  border-color: #ff0080;
  box-shadow: 0 0 20px rgba(255,0,128,0.4), inset 0 0 20px rgba(255,0,128,0.1);
}

.retro-icon {
  font-size: 36px;
  margin-bottom: 12px;
}

.retro-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Buttons */
.retro-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 40px;
}

.btn-retro-back {
  padding: 16px 32px;
  background: transparent;
  border: 1px solid rgba(0,255,255,0.3);
  color: #00ffff;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-retro-back:hover {
  border-color: #00ffff;
  background: rgba(0,255,255,0.1);
  box-shadow: 0 0 20px rgba(0,255,255,0.3);
}

.btn-retro-next {
  padding: 16px 40px;
  background: linear-gradient(90deg, #ff0080, #ff8c00);
  color: #fff;
  font-weight: 800;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 3px;
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 0 30px rgba(255,0,128,0.4);
}

.btn-retro-next:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 50px rgba(255,0,128,0.6);
}

/* Stats */
.retro-stats {
  display: flex;
  justify-content: center;
  gap: 60px;
  margin-top: 60px;
}

.stat-item {
  text-align: center;
}

.stat-value {
  font-size: 36px;
  font-weight: 900;
  color: #ff0080;
  text-shadow: 0 0 20px #ff0080;
}

.stat-name {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.4);
  margin-top: 4px;
}
</style>
</head>
<body>
<div class="stars"></div>
<div class="sunset"></div>
<div class="sun"></div>
<div class="floor"></div>

<div class="container">
  <header class="header">
    <div class="retro-badge">Neural Estimation</div>
    <h1>CALC<br><span class="outline">PROJECT</span></h1>
    <p class="subtitle">Узнай стоимость своего проекта за 10 секунд</p>
  </header>

  <div class="neon-progress">
    <div class="neon-bar active"></div>
    <div class="neon-bar"></div>
    <div class="neon-bar"></div>
    <div class="neon-bar"></div>
  </div>

  <div class="retro-card">
    <h2 class="card-title">Тип проекта</h2>
    <p class="card-desc">Выберите категорию для начала расчёта</p>

    <div class="retro-grid">
      <div class="retro-item selected">
        <div class="retro-icon">🌐</div>
        <div class="retro-label">Landing</div>
      </div>
      <div class="retro-item">
        <div class="retro-icon">🏢</div>
        <div class="retro-label">Corporate</div>
      </div>
      <div class="retro-item">
        <div class="retro-icon">🛒</div>
        <div class="retro-label">E-commerce</div>
      </div>
      <div class="retro-item">
        <div class="retro-icon">💻</div>
        <div class="retro-label">Web App</div>
      </div>
      <div class="retro-item">
        <div class="retro-icon">📱</div>
        <div class="retro-label">Mobile</div>
      </div>
      <div class="retro-item">
        <div class="retro-icon">🤖</div>
        <div class="retro-label">Bot</div>
      </div>
      <div class="retro-item">
        <div class="retro-icon">📊</div>
        <div class="retro-label">CRM</div>
      </div>
      <div class="retro-item">
        <div class="retro-icon">⚙️</div>
        <div class="retro-label">API</div>
      </div>
    </div>

    <div class="retro-nav">
      <button class="btn-retro-back">← Back</button>
      <button class="btn-retro-next">Next →</button>
    </div>
  </div>

  <div class="retro-stats">
    <div class="stat-item">
      <div class="stat-value">2500+</div>
      <div class="stat-name">Projects</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">94%</div>
      <div class="stat-name">Accuracy</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">&lt;10s</div>
      <div class="stat-name">Speed</div>
    </div>
  </div>
</div>
</body>
</html>
