<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сколько стоит проект?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --electric-blue: #0066ff;
    --sky-blue: #38bdf8;
    --white: #ffffff;
    --coral: #ff6b6b;
    --navy: #0a0e1a;
  }

  body {
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
  }

  /* ── Canvas Background ── */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
  }

  /* ── Grain / Noise Overlay ── */
  .grain-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 5;
    pointer-events: none;
    opacity: 0.045;
  }
  .grain-overlay svg {
    width: 100%;
    height: 100%;
  }

  /* ── UI Layer ── */
  .ui-layer {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px;
    width: 100%;
    max-width: 560px;
  }

  /* ── Glass Panel ── */
  .glass-panel {
    width: 100%;
    background: rgba(10, 14, 26, 0.55);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(56, 189, 248, 0.2);
    border-radius: 24px;
    padding: 40px 36px 36px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ── Step Indicator ── */
  .step-indicator {
    display: flex;
    gap: 8px;
  }
  .step-bar {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.1);
    overflow: hidden;
  }
  .step-bar.active {
    background: linear-gradient(90deg, var(--electric-blue), var(--sky-blue));
  }

  /* ── Title ── */
  .panel-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 28px;
    line-height: 1.15;
    color: var(--white);
    text-shadow: 0 0 30px rgba(56, 189, 248, 0.35), 0 0 60px rgba(56, 189, 248, 0.1);
  }
  .panel-subtitle {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 6px;
  }

  /* ── Section Label ── */
  .section-label {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.45);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── Pills Grid ── */
  .pills-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 18px;
    border-radius: 9999px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.75);
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
  }
  .pill:hover {
    border-color: var(--sky-blue);
    transform: scale(1.05);
    background: rgba(56, 189, 248, 0.08);
  }
  .pill.selected {
    background: linear-gradient(135deg, var(--electric-blue), #0088ff);
    border-color: transparent;
    color: var(--white);
    box-shadow: 0 4px 20px rgba(0, 102, 255, 0.4), 0 0 40px rgba(0, 102, 255, 0.15);
  }
  .pill-emoji {
    font-size: 16px;
    line-height: 1;
  }

  /* ── Calculate Button ── */
  .calc-btn {
    width: 100%;
    padding: 16px 24px;
    border: none;
    border-radius: 9999px;
    background: linear-gradient(135deg, var(--electric-blue), #0088ff, var(--sky-blue));
    background-size: 200% 200%;
    animation: btnGradient 4s ease infinite;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: var(--white);
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 24px rgba(0, 102, 255, 0.3);
    letter-spacing: 0.02em;
  }
  .calc-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0, 102, 255, 0.5);
  }
  .calc-btn:active {
    transform: translateY(0);
  }

  @keyframes btnGradient {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* ── Bottom Stats ── */
  .bottom-stats {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.35);
    text-align: center;
    letter-spacing: 0.01em;
  }
  .bottom-stats span {
    color: rgba(56, 189, 248, 0.6);
  }
</style>
</head>
<body>

<!-- Background Canvas -->
<canvas id="bg-canvas"></canvas>

<!-- Grain Noise Overlay -->
<div class="grain-overlay">
  <svg xmlns="http://www.w3.org/2000/svg">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain)"/>
  </svg>
</div>

<!-- Calculator UI -->
<div class="ui-layer">
  <div class="glass-panel">
    <!-- Step Indicator -->
    <div class="step-indicator">
      <div class="step-bar active"></div>
      <div class="step-bar"></div>
      <div class="step-bar"></div>
      <div class="step-bar"></div>
    </div>

    <!-- Title -->
    <div>
      <div class="panel-title">Сколько стоит проект?</div>
      <div class="panel-subtitle">Ответьте на 4 вопроса — получите оценку за 30 секунд</div>
    </div>

    <!-- Project Type -->
    <div>
      <div class="section-label">Тип проекта</div>
    </div>
    <div class="pills-grid">
      <div class="pill selected" onclick="selectPill(this)">
        <span class="pill-emoji">🌐</span> Веб-сайт
      </div>
      <div class="pill" onclick="selectPill(this)">
        <span class="pill-emoji">📱</span> Мобильное приложение
      </div>
      <div class="pill" onclick="selectPill(this)">
        <span class="pill-emoji">🛒</span> E-commerce
      </div>
      <div class="pill" onclick="selectPill(this)">
        <span class="pill-emoji">🤖</span> AI / ML продукт
      </div>
      <div class="pill" onclick="selectPill(this)">
        <span class="pill-emoji">📊</span> SaaS платформа
      </div>
      <div class="pill" onclick="selectPill(this)">
        <span class="pill-emoji">🎨</span> Дизайн-система
      </div>
      <div class="pill" onclick="selectPill(this)">
        <span class="pill-emoji">⚡</span> MVP стартапа
      </div>
      <div class="pill" onclick="selectPill(this)">
        <span class="pill-emoji">🔧</span> Рефакторинг
      </div>
    </div>

    <!-- Calculate Button -->
    <button class="calc-btn">Рассчитать →</button>
  </div>

  <!-- Bottom Stats -->
  <div class="bottom-stats">
    <span>2,500+</span> проектов &nbsp;•&nbsp; <span>94%</span> точность
  </div>
</div>

<script>
// ─── Pill Selection ───
function selectPill(el) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
}

// ─── Canvas Setup ───
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H;
let mouseX = -9999, mouseY = -9999;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
document.addEventListener('mouseleave', () => {
  mouseX = -9999;
  mouseY = -9999;
});

// ─── Color Helpers ───
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// ─── Layer 1: Flowing Waves ───
const waves = [];
for (let i = 0; i < 5; i++) {
  waves.push({
    frequency: 0.002 + Math.random() * 0.003,
    amplitude: 40 + Math.random() * 60,
    speed: 0.008 + Math.random() * 0.015,
    phase: Math.random() * Math.PI * 2,
    yOffset: H * 0.3 + Math.random() * H * 0.4,
    opacity: 0.05 + i * 0.025,
    color1: i < 3 ? '#0066ff' : '#38bdf8',
    color2: i < 2 ? '#38bdf8' : '#0066ff',
  });
}

function drawWaves(time) {
  waves.forEach(wave => {
    // Calculate mouse influence on amplitude
    const mouseCenterY = mouseY;
    const mouseInfluence = 60;

    ctx.beginPath();
    ctx.moveTo(0, H);

    for (let x = 0; x <= W; x += 3) {
      // Base wave
      let y = wave.yOffset + Math.sin(x * wave.frequency + wave.phase + time * wave.speed) * wave.amplitude;
      // Add secondary harmonic
      y += Math.sin(x * wave.frequency * 2.3 + wave.phase * 0.7 + time * wave.speed * 1.5) * wave.amplitude * 0.3;

      // Mouse distortion
      if (mouseX > -999) {
        const dx = x - mouseX;
        const dy = y - mouseCenterY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 250) {
          const influence = (1 - dist / 250) * mouseInfluence;
          y += Math.sin(time * 0.03 + x * 0.01) * influence;
        }
      }

      ctx.lineTo(x, y);
    }

    ctx.lineTo(W, H);
    ctx.closePath();

    // Gradient fill
    const grad = ctx.createLinearGradient(0, wave.yOffset - wave.amplitude, 0, H);
    grad.addColorStop(0, hexToRgba(wave.color1, wave.opacity));
    grad.addColorStop(0.5, hexToRgba(wave.color2, wave.opacity * 0.5));
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fill();
  });
}

// ─── Layer 2: Floating Orbs ───
const orbs = [];
const orbColors = [
  { inner: '#0066ff', outer: '#0044aa' },
  { inner: '#38bdf8', outer: '#0088cc' },
  { inner: '#ffffff', outer: '#88ccff' },
  { inner: '#0066ff', outer: '#38bdf8' },
  { inner: '#38bdf8', outer: '#0066ff' },
  { inner: '#ff6b6b', outer: '#cc4444' },
  { inner: '#ff6b6b', outer: '#ff4444' },
  { inner: '#ff6b6b', outer: '#cc3333' },
];

for (let i = 0; i < 18; i++) {
  const colorSet = orbColors[i % orbColors.length];
  orbs.push({
    x: Math.random() * (typeof W !== 'undefined' ? W : 1200),
    y: Math.random() * (typeof H !== 'undefined' ? H : 800),
    radius: 30 + Math.random() * 90,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    opacity: 0.08 + Math.random() * 0.22,
    inner: colorSet.inner,
    outer: colorSet.outer,
    phase: Math.random() * Math.PI * 2,
  });
}

function drawOrbs(time) {
  orbs.forEach(orb => {
    // Mouse attraction
    if (mouseX > -999) {
      const dx = mouseX - orb.x;
      const dy = mouseY - orb.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200 && dist > 1) {
        const force = (1 - dist / 200) * 0.5;
        orb.vx += (dx / dist) * force;
        orb.vy += (dy / dist) * force;
      }
    }

    // Damping
    orb.vx *= 0.995;
    orb.vy *= 0.995;

    orb.x += orb.vx;
    orb.y += orb.vy;

    // Bounce off edges
    if (orb.x < -orb.radius) orb.x = W + orb.radius;
    if (orb.x > W + orb.radius) orb.x = -orb.radius;
    if (orb.y < -orb.radius) orb.y = H + orb.radius;
    if (orb.y > H + orb.radius) orb.y = -orb.radius;

    // Breathing effect
    const breathe = 1 + Math.sin(time * 0.001 + orb.phase) * 0.1;
    const r = orb.radius * breathe;

    // Draw with radial gradient + blur via shadowBlur
    ctx.save();
    ctx.shadowBlur = r * 0.8;
    ctx.shadowColor = hexToRgba(orb.inner, orb.opacity * 0.5);

    const grad = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, r);
    grad.addColorStop(0, hexToRgba(orb.inner, orb.opacity));
    grad.addColorStop(0.6, hexToRgba(orb.outer, orb.opacity * 0.4));
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    ctx.beginPath();
    ctx.arc(orb.x, orb.y, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();
  });
}

// ─── Layer 3: Sparkle Particles ───
const particles = [];
for (let i = 0; i < 65; i++) {
  particles.push({
    x: Math.random() * (typeof W !== 'undefined' ? W : 1200),
    y: Math.random() * (typeof H !== 'undefined' ? H : 800),
    radius: 1 + Math.random() * 2,
    phase: Math.random() * Math.PI * 2,
    twinkleSpeed: 0.002 + Math.random() * 0.004,
    color: Math.random() > 0.4 ? '#ffffff' : '#38bdf8',
  });
}

function drawParticles(time) {
  // Draw connections first
  ctx.lineWidth = 0.5;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        const lineOpacity = (1 - dist / 100) * 0.15;
        ctx.strokeStyle = `rgba(56, 189, 248, ${lineOpacity})`;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  // Draw particles
  particles.forEach(p => {
    const twinkle = (Math.sin(time * p.twinkleSpeed + p.phase) + 1) / 2;
    const alpha = twinkle * 0.9 + 0.1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = p.color === '#ffffff'
      ? `rgba(255, 255, 255, ${alpha})`
      : `rgba(56, 189, 248, ${alpha})`;
    ctx.fill();

    // Subtle glow for brighter particles
    if (alpha > 0.6) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * 3, 0, Math.PI * 2);
      ctx.fillStyle = p.color === '#ffffff'
        ? `rgba(255, 255, 255, ${alpha * 0.08})`
        : `rgba(56, 189, 248, ${alpha * 0.08})`;
      ctx.fill();
    }
  });
}

// ─── Cursor Glow ───
function drawCursorGlow() {
  if (mouseX < -999) return;

  const grad = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 180);
  grad.addColorStop(0, 'rgba(56, 189, 248, 0.08)');
  grad.addColorStop(0.4, 'rgba(56, 189, 248, 0.03)');
  grad.addColorStop(1, 'rgba(0, 0, 0, 0)');

  ctx.beginPath();
  ctx.arc(mouseX, mouseY, 180, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
}

// ─── Animation Loop ───
let startTime = performance.now();

function animate(timestamp) {
  const elapsed = timestamp - startTime;

  ctx.clearRect(0, 0, W, H);

  // Dark base
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);

  // Draw layers in order
  drawWaves(elapsed);
  drawOrbs(elapsed);
  drawParticles(elapsed);
  drawCursorGlow();

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

// ─── Recalculate positions on resize ───
window.addEventListener('resize', () => {
  waves.forEach(wave => {
    wave.yOffset = H * 0.3 + Math.random() * H * 0.4;
  });
});
</script>
</body>
</html>
